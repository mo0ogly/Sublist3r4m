site_name: Sublist3r4m
site_description: Subdomain enumeration tool for penetration testers and security researchers
site_url: https://mo0ogly.github.io/Sublist3r4m/
repo_url: https://github.com/mo0ogly/Sublist3r4m
repo_name: mo0ogly/Sublist3r4m

docs_dir: docs_src

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest

nav:
  - Home: index.md
  - Installation: installation.md
  - Usage: usage.md
  - Python API: api.md
  - Modules:
      - JARVIS Intelligence Scanner: modules/jarvis.md
      - Owner Research Engine: modules/owner-research.md
      - SubBrute: modules/subbrute.md
  - Contributing: contributing.md
  - Changelog: changelog.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
